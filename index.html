
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" type="imagex/jpeg" href="https://internetmais.net/wp-content/uploads/2018/05/Logo_internet_MAIS.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <title>Gerador de OS</title>

    <script>
    async function logIP() {
      try {
        const response = await fetch('/api/ip');
        const { ip } = await response.json();
        console.log("IP capturado:", ip);
        gtag('event', 'ip_capture', { ip_address: ip });
      } catch (error) {
        console.error("Erro ao capturar IP:", error);
      }
    }
    logIP();
    </script>

    <script>
        window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>

    <style>
    * {
        box-sizing: border-box;
    }

    body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: radial-gradient(circle at top left, #0a28e9 0, #051937 55%, #020817 100%);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        color: #0f172a;
    }

    .container {
        width: 100%;
        max-width: 720px;
        padding: 24px 28px 20px;
        background: rgba(15, 23, 42, 0.85);
        border-radius: 18px;
        box-shadow: 0 18px 45px rgba(15, 23, 42, 0.6);
        display: flex;
        flex-direction: column;
        gap: 18px;
        position: relative;
        border: 1px solid rgba(148, 163, 184, 0.35);
        backdrop-filter: blur(16px);
    }

    h1 {
        text-align: left;
        color: #e5e7eb;
        font-size: 20px;
        margin: 0 0 4px;
        letter-spacing: 0.02em;
    }

    .subtitle {
        font-size: 12px;
        color: #9ca3af;
        margin-bottom: 8px;
    }

    .clear-btn {
        position: absolute;
        top: 18px;
        right: 18px;
        background: rgba(15, 23, 42, 0.0);
        color: #e5e7eb;
        padding: 5px 11px;
        border-radius: 999px;
        cursor: pointer;
        font-size: 12px;
        border: 1px solid rgba(148, 163, 184, 0.5);
        display: inline-flex;
        align-items: center;
        gap: 6px;
        transition: background 0.12s ease, border-color 0.12s ease, color 0.12s ease;
    }

    .clear-btn:hover {
        background: rgba(15, 23, 42, 0.85);
        border-color: rgba(148, 163, 184, 0.9);
    }

    .form-row {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 14px 12px;
    }

    .form-group {
        min-width: 0;
    }

    label {
        font-weight: 500;
        color: #e5e7eb;
        font-size: 13px;
        margin-bottom: 4px;
        display: block;
    }

    input, select, textarea {
        width: 100%;
        padding: 8px 10px;
        border-radius: 10px;
        border: 1px solid #1f2937;
        background: rgba(15, 23, 42, 0.9);
        color: #e5e7eb;
        font-size: 14px;
        box-sizing: border-box;
        transition: border-color 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    }

    input::placeholder {
        color: #6b7280;
    }

    input:focus, select:focus, textarea:focus {
        outline: none;
        border-color: #3b82f6;
        box-shadow: 0 0 0 1px rgba(59, 130, 246, 0.7);
        background: rgba(15, 23, 42, 0.95);
    }

    .generate-btn {
        background: linear-gradient(135deg, #3b82f6, #2563eb);
        color: #f9fafb;
        padding: 9px 12px;
        border: none;
        border-radius: 999px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 600;
        width: 100%;
        margin-top: 4px;
        letter-spacing: 0.02em;
        box-shadow: 0 10px 25px rgba(37, 99, 235, 0.45);
        transition: transform 0.08s ease, box-shadow 0.08s ease, filter 0.08s ease;
    }

    .generate-btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 14px 30px rgba(37, 99, 235, 0.6);
        filter: brightness(1.06);
    }

    .output {
        margin-top: 10px;
        padding: 10px 12px;
        background: rgba(15, 23, 42, 0.85);
        border-radius: 12px;
        word-wrap: break-word;
        white-space: pre-wrap;
        font-size: 13px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        border: 1px solid rgba(55, 65, 81, 0.9);
        color: #e5e7eb;
    }

    .copy-btn {
        background: rgba(15, 23, 42, 0.0);
        color: #e5e7eb;
        padding: 8px 11px;
        border-radius: 999px;
        cursor: pointer;
        width: 100%;
        margin-top: 8px;
        font-size: 13px;
        border: 1px solid rgba(148, 163, 184, 0.5);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        transition: background 0.12s ease, border-color 0.12s ease, color 0.12s ease;
    }

    .copy-btn:hover {
        background: rgba(15, 23, 42, 0.85);
        border-color: rgba(148, 163, 184, 0.9);
    }

    @media (max-width: 720px) {
        .container {
            margin: 12px;
            padding: 20px 18px 16px;
        }
        .form-row {
            grid-template-columns: 1fr;
        }
        .clear-btn {
            display: none;
        }
    }

    footer {
        width: 100%;
        text-align: center;
        padding: 6px 8px;
        background-color: transparent;
        color: #9ca3af;
        position: fixed;
        bottom: 8px;
        left: 0;
        font-size: 12px;
    }
    </style>
</head>
<body>

<div class="container">
    <h1>Gerador de OS</h1>
    <p class="subtitle">Preencha os campos abaixo e clique em Gerar Script.</p>

    <button class="clear-btn" onclick="limparDados()">Limpar dados</button>

    <div class="form-row">
        <div class="form-group">
            <label for="titulo">Título</label>
            <select id="titulo">
                <option value="Atenuação">Atenuação</option>
                <option value="Rompimento">Rompimento</option>
                <option value="Reparo de fibra">Reparo de fibra</option>
                <option value="Visita técnica">Visita técnica</option>
            </select>
        </div>
        <div class="form-group">
            <label for="idOs">ID OS</label>
            <input type="text" id="idOs" required>
        </div>
        <div class="form-group">
            <label for="cliente">Cliente</label>
            <input type="text" id="cliente" required>
        </div>
    </div>

    <div class="form-row">
        <div class="form-group">
            <label for="descricao">Descrição</label>
            <input type="text" id="descricao" required>
        </div>
        <div class="form-group">
            <label for="periodo">Período</label>
            <select id="periodo">
                <option value="Manhã">Manhã</option>
                <option value="Tarde">Tarde</option>
                <option value="Noite">Noite</option>
                <option value="Qualquer">Qualquer</option>
            </select>
        </div>
        <div class="form-group">
            <label for="data">Data</label>
            <input type="date" id="data" required>
        </div>
    </div>

    <div class="form-row">
        <div class="form-group">
            <label for="obs">Observação</label>
            <input type="text" id="obs" required>
        </div>
        <div class="form-group">
            <label for="endereco">Endereço</label>
            <input type="text" id="endereco" required>
        </div>
        <div class="form-group">
            <label for="telefone">Telefone</label>
            <input type="tel" id="telefone" placeholder="(XX) XXXXX-XXXX" required>
        </div>        
        <div class="form-group">
            <label for="atendente">Atendente</label>
            <select id="atendente">
                <option value="Pedro">Pedro</option>
                <option value="Matheus">Matheus</option>
                <option value="Ricardo">Ricardo</option>
                <option value="Vinicius">Vinicius</option>
                <option value="Leonardo">Leonardo</option>
                <option value="Robson">Robson</option>
                <option value="Paulo">Paulo</option>
                <option value="Alessandro">Alessandro</option>
            </select>
        </div>
    </div>

    <button class="generate-btn" onclick="gerarScript()">Gerar Script</button>
    <div class="output" id="output"></div>
    <button class="copy-btn" id="copyButton" onclick="copiarScript()" style="display:none;">Copiar Script</button>
</div>

<footer>
    Todos os direitos reservados - 2025 - PP
</footer>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/pt.js"></script>

<script>
    flatpickr("#data", {
        locale: "pt",
        dateFormat: "d/m",
        altInput: true,
        altFormat: "d/m",
    });

    function gerarScript() {
        const titulo = document.getElementById('titulo').value;
        const idOs = document.getElementById('idOs').value;
        const cliente = document.getElementById('cliente').value;
        const descricao = document.getElementById('descricao').value;
        const periodo = document.getElementById('periodo').value;
        const data = document.getElementById('data').value;
        const obs = document.getElementById('obs').value;
        const telefone = document.getElementById('telefone').value;
        const endereco = document.getElementById('endereco').value;
        const atendente = document.getElementById('atendente').value;

        let script = idOs.trim() === "" ?
            `-------------------------------------------\n${titulo}\nCLIENTE: ${cliente}\nDESCRIÇÃO: ${descricao}\nPERÍODO: ${periodo}\nDATA: ${data}\nOBS: ${obs}\nENDEREÇO: ${endereco}\nATENDENTE: ${atendente}\nTELEFONE: ${telefone}\n-------------------------------------------` :
            `${titulo}\nID OS: ${idOs}\nCLIENTE: ${cliente}\nDESCRIÇÃO: ${descricao}\nPERÍODO: ${periodo}\nDATA: ${data}\nOBS: ${obs}\nENDEREÇO: ${endereco}\nATENDENTE: ${atendente}\nTELEFONE: ${telefone}`;

        document.getElementById('output').textContent = script;
        document.getElementById('copyButton').style.display = 'inline-flex';
    }

    function copiarScript() {
        const outputText = document.getElementById('output').textContent;
        navigator.clipboard.writeText(outputText).then(() => {
            const alerta = document.createElement("div");
            alerta.style.cssText = `
                position: fixed;
                inset: 16px 16px auto;
                display: flex;
                justify-content: center;
                z-index: 9999;
            `;

            const alertaInner = document.createElement("div");
            alertaInner.style.cssText = `
                padding: 8px 14px;
                border-radius: 999px;
                background: rgba(16, 185, 129, 0.95);
                color: #ecfdf5;
                font-size: 13px;
                box-shadow: 0 10px 25px rgba(16, 185, 129, 0.4);
            `;
            alertaInner.textContent = "Máscara copiada!";

            alerta.appendChild(alertaInner);
            document.body.appendChild(alerta);

            setTimeout(() => {
                alerta.remove();
            }, 1100);
        }).catch(error => {
            alert('Falha ao copiar: ' + error);
        });
    }

    function limparDados() {
        document.getElementById('titulo').value = 'Atenuação';
        document.getElementById('idOs').value = '';
        document.getElementById('cliente').value = '';
        document.getElementById('descricao').value = '';
        document.getElementById('periodo').value = 'Manhã';
        document.getElementById('data').value = '';
        document.getElementById('obs').value = '';
        document.getElementById('endereco').value = '';
        document.getElementById('telefone').value = '';
        document.getElementById('atendente').value = 'Pedro';
        document.getElementById('output').textContent = '';
        document.getElementById('copyButton').style.display = 'none';
    }
</script>
</body>
</html>
